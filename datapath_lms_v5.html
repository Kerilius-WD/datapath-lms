          <div class="quiz-counter">Question ${MS.current+1} of ${qs.length}</div>
          <div class="quiz-score-live" style="color:${answered>0?(MS.answers.filter(a=>a.correct).length/answered)>=0.6?'var(--teal)':'var(--amber)':'var(--text-2)'}">
            ${MS.answers.filter(a=>a.correct).length}/${answered} correct
          </div>
        </div>
        <div class="question-card">
          <div class="q-number">Question ${MS.current+1}</div>
          <div class="q-text">${q.q}</div>
        </div>
        <div class="options-list">
          ${q.opts.map((opt,i)=>`<button class="opt-btn" onclick="selectAnswer(${i})">
            <div class="opt-label">${labels[i]}</div>
            <div>${opt}</div>
          </button>`).join('')}
        </div>
        <div id="feedback-area" style="margin-top:10px"></div>
      </div>`;
    }

    case 'result':{
      const score=MS.score,total=MS.questions.length;
      const pct=Math.round((score/total)*100);
      const pass=pct>=60;
      const color=pass?'var(--teal)':pct>=40?'var(--amber)':'var(--red)';
      const di2=CUR.findIndex(d=>d.mods.some(m=>m.id===mod.id));
      const d2=CUR[di2];
      const modIdx=d2.mods.findIndex(m=>m.id===mod.id);
      const nextMod=modIdx<d2.mods.length-1?d2.mods[modIdx+1]:null;
      const nextDay=di2<CUR.length-1?CUR[di2+1]:null;
      const wrongCount=MS.answers.filter(a=>!a.correct).length;
      return`<div class="result-wrap">
        <div class="result-score-ring" style="border-color:${color};color:${color}">
          <div class="result-big-num">${score}</div>
          <div class="result-denom">out of ${total}</div>
        </div>
        <div class="result-verdict" style="color:${color}">${pass?'Module complete!':pct>=40?'Nearly there':'Needs review'}</div>
        <div class="result-sub">${pass?`You scored ${pct}% — above the 60% mastery threshold. Module marked complete.${wrongCount>0?` ${wrongCount} wrong answer${wrongCount!==1?'s':''} added to your Review Queue.`:''}`:`You scored ${pct}%. ${wrongCount} question${wrongCount!==1?'s':''} added to Review Queue. Review the lesson and retake to unlock this module.`}</div>
        ${wrongCount>0?`<div style="margin-bottom:14px"><span class="due-badge" onclick="go('review')">📌 ${wrongCount} card${wrongCount!==1?'s':''} queued for spaced review →</span></div>`:''}
        <div class="result-actions">
          ${pass&&nextMod?`<button class="focus-btn" onclick="go('module',{mod:'${nextMod.id}'})">Next: ${nextMod.title} →</button>`:''}
          ${pass&&!nextMod&&nextDay?`<button class="focus-btn" onclick="go('day',{day:${nextDay.day}})">Day ${nextDay.day} →</button>`:''}
          <button class="btn-sm" onclick="MS.phase='lesson';patchModuleContent(renderModuleContent(ALL_MODS.find(m=>m.id==='${mod.id}')))">Review lesson</button>
          <button class="btn-sm" onclick="retryQuiz('${mod.id}')">Retake quiz</button>
        </div>
        <div class="result-breakdown">
          <div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px">Question breakdown</div>
          ${MS.answers.map((a,i)=>`<div class="rb-row">
            <div class="rb-icon">${a.correct?'✅':'❌'}</div>
            <div class="rb-q">Q${i+1}: ${a.q.length>70?a.q.slice(0,70)+'…':a.q}</div>
            ${!a.correct?`<div style="font-size:10px;color:var(--purple)">→ queued</div>`:''}
          </div>`).join('')}
        </div>
      </div>`;
    }

    default: return'';
  }
}

  </div>`;
}

function vReviewContent(){
  const due=getDueCards();
  const all=getAllSRCards();
  const labels=['A','B','C','D'];

  if(SR.phase==='idle'){
    // Stats by domain
    const domainCards=[0,1,2,3,4].map(i=>{
      const domMods=CUR.filter(d=>d.domain===i).flatMap(d=>d.mods).map(m=>m.id);
      const cards=all.filter(c=>domMods.includes(c.modId));
      const dueNow=cards.filter(c=>c.nextReview<=Date.now());
      return{i,total:cards.length,due:dueNow.length};
    }).filter(d=>d.total>0);

    // All cards table (upcoming)
    const upcoming=all
      .filter(c=>c.nextReview>Date.now())
      .sort((a,b)=>a.nextReview-b.nextReview)
      .slice(0,8);

    return`
      <div class="rq-hero">
        <div class="rq-count-ring" style="border-color:${due.length>0?'var(--purple)':'var(--teal)'};color:${due.length>0?'var(--purple)':'var(--teal)'}">

          <div class="rq-count-lbl">due now</div>
        </div>
        <div style="font-size:17px;font-weight:700;margin-bottom:6px">${due.length>0?`${due.length} card${due.length!==1?'s':''} ready to review`:'You\'re all caught up!'}</div>
        <div style="font-size:13px;color:var(--text-2);margin-bottom:20px;max-width:440px;margin-left:auto;margin-right:auto">${due.length>0?'These concepts are at the optimal moment for review — do it now while the forgetting curve is in your favour.':'No cards are due right now. Keep working through modules and wrong answers will appear here automatically.'}</div>
        ${due.length>0?`<button class="focus-btn" onclick="startReviewSession()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M4.5 2.5l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Start review session (${due.length} cards)
        </button>`:'<button class="btn-sm" onclick="go(\'dashboard\')">Back to dashboard</button>'}
      </div>

      ${domainCards.length>0?`
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px">
        <div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px">Cards by domain</div>
        ${domainCards.map(({i,total,due:dNow})=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="width:8px;height:8px;border-radius:50%;background:${DC[i]};flex-shrink:0"></div>
          <div style="flex:1;font-size:13px">${DS[i]}</div>
          <div style="font-size:12px;color:var(--text-2);font-family:'IBM Plex Mono',monospace">${total} card${total!==1?'s':''}</div>
          ${dNow>0?`<div style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(139,92,246,.12);color:var(--purple)">${dNow} due</div>`:'<div style="font-size:11px;color:var(--text-3)">scheduled</div>'}
        </div>`).join('')}
      </div>`:''}

      ${upcoming.length>0?`
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px">
        <div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px">Upcoming reviews</div>
        ${upcoming.map(c=>{
          const mod=ALL_MODS.find(m=>m.id===c.modId);
          const daysLeft=Math.ceil((c.nextReview-Date.now())/(24*60*60*1000));
          return`<div style="display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
            <div style="flex:1;min-width:0">
              <div style="font-size:12.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.q.length>70?c.q.slice(0,70)+'…':c.q}</div>
              <div style="font-size:11px;color:var(--text-3);margin-top:2px">${mod?.title||c.modId}</div>
            </div>
            <div style="font-size:11px;font-weight:600;color:var(--text-2);font-family:'IBM Plex Mono',monospace;flex-shrink:0;white-space:nowrap">in ${daysLeft}d · ×${c.repetition}</div>
          </div>`;
        }).join('')}
      </div>`:''}`;
  }

  if(SR.phase==='session'){
    const card=SR.queue[SR.current];
    const prog=Math.round((SR.current/SR.queue.length)*100);
    const mod=ALL_MODS.find(m=>m.id===card.modId);
    const di=CUR.findIndex(d=>d.mods.some(m=>m.id===card.modId));
    const domColor=di>=0&&CUR[di].domain>=0?DC[CUR[di].domain]:'var(--purple)';
    return`<div class="rq-session-wrap">
      <div class="rq-prog-bar"><div class="rq-prog-fill" style="width:${prog}%"></div></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <div style="font-size:12px;color:var(--text-2);font-family:'IBM Plex Mono',monospace">Card ${SR.current+1} of ${SR.queue.length}</div>
        <div style="font-size:12px;font-weight:600;color:${SR.sessionAnswers.length>0?(SR.sessionAnswers.filter(a=>a.correct).length/SR.sessionAnswers.length)>=0.6?'var(--teal)':'var(--amber)':'var(--text-2)'};font-family:'IBM Plex Mono',monospace">
          ${SR.sessionAnswers.filter(a=>a.correct).length}/${SR.sessionAnswers.length} correct
        </div>
      </div>
      <div class="rq-card">
        <div class="rq-card-meta">
          <span style="color:${domColor}">${mod?.title||''}</span>
          <span style="color:var(--text-3)">·</span>
          <span class="rq-interval-tag">Review ×${card.repetition+1}</span>
          <span style="color:var(--text-3)">·</span>
          <span style="color:var(--text-3)">Interval: ${card.interval}d</span>
        </div>
        <div class="q-text">${card.q}</div>
      </div>
      <div class="options-list">
        ${card.opts.map((opt,i)=>`<button class="opt-btn" onclick="srSelectAnswer(${i})">
          <div class="opt-label">${labels[i]}</div>
          <div>${opt}</div>
        </button>`).join('')}
      </div>
      <div id="sr-feedback" style="margin-top:10px"></div>
    </div>`;
  }

  if(SR.phase==='done'){
    const correct=SR.sessionAnswers.filter(a=>a.correct).length;
    const total=SR.sessionAnswers.length;
    const pct=total>0?Math.round((correct/total)*100):0;
    const stillDue=srDueCount();
    return`<div class="sr-session-result">
      <div style="font-size:36px;margin-bottom:18px">✅</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:6px">Session complete</div>
      <div style="font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${pct>=70?'var(--teal)':pct>=50?'var(--amber)':'var(--red)'};margin-bottom:6px">${correct}/${total}</div>
      <div style="font-size:13px;color:var(--text-2);line-height:1.7;max-width:420px;margin:0 auto 20px">
        Cards answered correctly are scheduled further out. Incorrect ones are already rescheduled for a short interval. The SM-2 algorithm adapts to your performance automatically.
      </div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        ${stillDue>0?`<button class="focus-btn" onclick="startReviewSession()">Review ${stillDue} more →</button>`:''}
        <button class="btn-sm" onclick="go('dashboard')">Back to dashboard</button>
      </div>
      <div style="margin-top:22px;border-top:1px solid var(--border);padding-top:16px">
        <div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px">Session breakdown</div>
        ${SR.sessionAnswers.map((a,i)=>`<div style="display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:14px">${a.correct?'✅':'❌'}</div>
          <div style="font-size:12px;color:var(--text-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.q.length>72?a.q.slice(0,72)+'…':a.q}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  return'';
}

        const unanswered=EX.answers[i]===undefined;
        const isFlagged=EX.flagged.has(i);
        return`<div class="er-review-row" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
          <div class="er-num">${i+1}</div>
          <div class="er-q">${q.q.length>75?q.q.slice(0,75)+'…':q.q}</div>
          ${isFlagged?`<div class="er-flag">🚩</div>`:''}
          <div style="font-size:13px;flex-shrink:0">${unanswered?'⬜':isCorrect?'✅':'❌'}</div>
        </div>
        <div style="display:none;padding:10px 14px 14px;background:rgba(0,0,0,.2);border-radius:0 0 8px 8px;margin-bottom:4px;font-size:12.5px;color:var(--text-2);line-height:1.7">
          <div style="margin-bottom:6px"><strong style="color:var(--text)">Correct answer:</strong> ${['A','B','C','D'][q.correct]}. ${q.opts[q.correct]}</div>
          ${!unanswered&&!isCorrect?`<div style="margin-bottom:6px"><strong style="color:var(--red)">Your answer:</strong> ${['A','B','C','D'][EX.answers[i]]}. ${q.opts[EX.answers[i]]}</div>`:''}
          <div>${q.explanation}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// VIEW: ANALYTICS
// ════════════════════════════════════════════════════
function vAnalytics(){
  const readiness=Math.min(100,Math.round(ST.mastery.reduce((acc,v,i)=>acc+v*(DW[i]/100),0)));
  const done=ST.done.length;
  const allCards=getAllSRCards();
  const retRate=allCards.length>0?Math.round((allCards.filter(c=>c.lastResult==='pass').length/allCards.length)*100):0;
  const scored=ALL_MODS.filter(m=>ST.quizScores[m.id]);
  const avgQuiz=scored.length>0?Math.round(scored.reduce((s,m)=>s+ST.quizScores[m.id].pct,0)/scored.length):0;
  const exams=ST.examHistory;
  const bestExam=exams.length?Math.max(...exams.map(e=>e.scaled)):null;

  // Quiz accuracy per module (worst 8)
  const modAccuracy=ALL_MODS.filter(m=>ST.quizScores[m.id]).map(m=>{
    const di=CUR.findIndex(d=>d.mods.some(mm=>mm.id===m.id));
    return{id:m.id,title:m.title,pct:ST.quizScores[m.id].pct,domain:CUR[di]?.domain||0};
  }).sort((a,b)=>a.pct-b.pct);

  return`<div class="analytics-wrap">
    <div style="margin-bottom:22px">
      <div style="font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:5px">Analytics</div>
      <div style="font-size:13px;color:var(--text-2)">Your complete performance picture — quiz accuracy, exam history, SR retention, domain mastery.</div>
    </div>

    <div class="an-grid-3" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card">
        <div class="stat-label">Exam Readiness</div>
        <div class="stat-val" style="color:${readiness>=70?'var(--teal)':readiness>=40?'var(--amber)':'var(--text)'}">${readiness}%</div>
        <div class="stat-sub">Weighted mastery</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Quiz Avg</div>
        <div class="stat-val" style="color:${avgQuiz>=70?'var(--teal)':avgQuiz>=50?'var(--amber)':'var(--text)'}">${avgQuiz}%</div>
        <div class="stat-sub">${scored.length} modules scored</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">SR Retention</div>
        <div class="stat-val" style="color:${retRate>=70?'var(--teal)':retRate>=50?'var(--amber)':'var(--text)'}">${retRate}%</div>
        <div class="stat-sub">${allCards.length} cards total</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Best Exam</div>
        <div class="stat-val" style="color:${bestExam===null?'var(--text)':bestExam>=675?'var(--teal)':'var(--amber)'}">${bestExam===null?'—':bestExam}</div>
        <div class="stat-sub">${exams.length} attempt${exams.length!==1?'s':''} · pass: 675</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px">
      <div class="an-card">
        <div class="an-section-title">Domain mastery vs exam weight</div>
        ${[0,1,2,3,4].map(i=>{
          const m=ST.mastery[i]||0;
          return`<div class="domain-row">
            <div class="dom-name">${DS[i]}</div>
            <div class="dom-bar-track"><div class="dom-bar-fill" style="width:${m}%;background:${DC[i]}"></div></div>
            <div class="dom-pct">${m}%</div>
            <div class="dom-wt">${DW[i]}%</div>
          </div>`;
        }).join('')}
        <div style="font-size:11px;color:var(--text-3);margin-top:12px">Right column = exam weight. Higher weight domains matter more for your score.</div>
      </div>

      <div class="an-card">
        <div class="an-section-title">Practice exam history</div>
        ${exams.length===0?`<div style="text-align:center;padding:30px 0;color:var(--text-3);font-size:13px">No exams taken yet.<br><button class="btn-sm btn-primary" style="margin-top:12px" onclick="go('exam')">Take first exam</button></div>`:`
        <div class="exam-hist-bar">
          ${exams.slice(-10).map((e,i)=>{
            const h=Math.round((e.scaled/900)*60);
            const c=e.pass?'var(--teal)':e.scaled>=600?'var(--amber)':'var(--red)';
            return`<div class="hist-bar-col">

              <div class="hist-bar" style="height:${h}px;background:${c}"></div>

          <div style="position:absolute;right:0;top:-8px;font-size:9px;color:var(--text-3);font-family:'IBM Plex Mono',monospace">675 pass</div>
        </div>
        <div style="font-size:11px;color:var(--text-3);margin-top:8px">${exams.length} total attempts · Best: ${Math.max(...exams.map(e=>e.scaled))} · Latest: ${exams[exams.length-1].scaled}</div>

      ${(modAccuracy.length>8?modAccuracy.slice(0,8):modAccuracy).map(m=>{

          <div class="acc-mod-name">${m.title}</div>
          <div class="acc-bar-track"><div class="acc-bar-fill" style="width:${m.pct}%;background:${c}"></div></div>

      <div class="an-card">

        ${allCards.filter(c=>c.modId==='exam').length>0?`<div style="display:flex;align-items:center;gap:8px;padding:7px 0">
          <div style="width:6px;height:6px;border-radius:50%;background:var(--text-3);flex-shrink:0"></div>
          <div style="flex:1;font-size:12.5px">From exams</div>
          <div style="font-size:11px;color:var(--text-2)">${allCards.filter(c=>c.modId==='exam').length} cards</div>
        </div>`:''}
        <div style="margin-top:12px"><button class="btn-sm" onclick="go('review')">Open Review Queue →</button></div>
      </div>

      <div class="an-card">
        <div class="an-section-title">Programme completion</div>
        <div style="font-size:32px;font-weight:700;font-family:'IBM Plex Mono',monospace;margin-bottom:4px;color:${done===TOTAL?'var(--teal)':'var(--text)'}">${done}<span style="font-size:16px;font-weight:400;color:var(--text-2)"> / ${TOTAL}</span></div>
        <div style="font-size:12px;color:var(--text-2);margin-bottom:14px">modules complete</div>
        ${CUR.map(d=>{
          const n=d.mods.filter(m=>ST.done.includes(m.id)).length;
          const p=Math.round((n/d.mods.length)*100);
          const c=d.domain>=0?DC[d.domain]:'var(--teal)';
          return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
            <div style="font-size:11px;color:var(--text-3);width:32px;font-family:'IBM Plex Mono',monospace">Day ${d.day}</div>
            <div style="flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden"><div style="height:100%;width:${p}%;background:${c};border-radius:3px"></div></div>
            <div style="font-size:11px;color:var(--text-2);width:32px;text-align:right">${n}/${d.mods.length}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════
function recalcMastery(){
  for(let i=0;i<5;i++){
    const allMods=CUR.filter(d=>d.domain===i).flatMap(d=>d.mods);
    if(!allMods.length)continue;
    const scored=allMods.filter(m=>ST.quizScores[m.id]);
    if(scored.length>0){
      const avg=scored.reduce((s,m)=>s+ST.quizScores[m.id].pct,0)/scored.length;
      const coverage=scored.length/allMods.length;
      ST.mastery[i]=Math.round(avg*coverage);
    }else{
      const done=allMods.filter(m=>ST.done.includes(m.id)).length;
      ST.mastery[i]=Math.round((done/allMods.length)*100);
    }
  }
}

function updateStreak(){
  const today=new Date().toDateString();
  if(ST.lastActive!==today){
    const yesterday=new Date(Date.now()-86400000).toDateString();
    ST.streak=ST.lastActive===yesterday?ST.streak+1:1;
    ST.lastActive=today;
  }
}

function setExamDate(){
  const inp=document.getElementById('exam-inp');
  if(inp&&inp.value){ST.examDate=inp.value;saveState();render();}
}

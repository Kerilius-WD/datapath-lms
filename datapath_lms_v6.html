<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataPath — CompTIA Data+ Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0D14;--surface:#13161F;--card:#1C1F2E;
  --border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.14);
  --text:#E8EAF0;--text-2:#8B8FA8;--text-3:#4A4D60;
  --teal:#00C9A7;--blue:#4D9EFF;--amber:#F59E0B;
  --red:#EF4444;--purple:#8B5CF6;--green:#10B981;
  --sidebar-w:244px
}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:28px 32px}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--teal),var(--blue));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;flex-shrink:0}
.logo-name{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:var(--text-3);letter-spacing:0.04em}
.nav-section{padding:10px 8px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:0.1em;color:var(--text-3);text-transform:uppercase;padding:0 8px;margin-bottom:3px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text-2);font-size:13px;transition:all .15s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.nav-item.active{background:rgba(0,201,167,0.1);color:var(--teal);font-weight:500}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:.8}
.day-nav{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:8px;cursor:pointer;color:var(--text-2);font-size:12.5px;transition:all .15s}
.day-nav:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.day-nav.active{color:var(--text);background:rgba(255,255,255,0.06)}
.day-nav.done .day-num{background:var(--teal);color:#000}
.day-num{width:22px;height:22px;border-radius:6px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-2);flex-shrink:0;font-family:'IBM Plex Mono',monospace;transition:all .2s}
.day-name-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.day-pct-label{font-size:10px;color:var(--text-3);font-family:'IBM Plex Mono',monospace}
.sidebar-footer{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border)}
.prog-track{height:4px;background:var(--card);border-radius:2px;margin-top:7px;overflow:hidden}
.prog-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .5s}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-2);flex:1;min-width:0}
.bc-sep{color:var(--text-3)}
.bc-link{cursor:pointer;transition:color .15s;white-space:nowrap}
.bc-link:hover{color:var(--text)}
.bc-cur{color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.badge{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;background:var(--card);border:1px solid var(--border);white-space:nowrap}
.badge-amber{color:var(--amber)}
.badge-teal{color:var(--teal)}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.stat-label{font-size:10px;font-weight:600;color:var(--text-2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:700;line-height:1;font-family:'IBM Plex Mono',monospace;margin-bottom:3px}
.stat-sub{font-size:11px;color:var(--text-2)}
.card-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.card-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-heading{font-size:10px;font-weight:600;color:var(--text-2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
.domain-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.domain-row:last-child{margin-bottom:0}
.dom-name{font-size:11.5px;color:var(--text);width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dom-bar-track{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.dom-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.dom-pct{font-size:11px;color:var(--text-2);width:32px;text-align:right;font-family:'IBM Plex Mono',monospace}
.dom-wt{font-size:10px;color:var(--text-3);width:26px;text-align:right}
.focus-domain-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.focus-title{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-bottom:5px;line-height:1.3}
.focus-desc{font-size:12.5px;color:var(--text-2);margin-bottom:16px;line-height:1.65}
.module-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.mod-chip{font-size:11px;color:var(--text-2);background:rgba(255,255,255,0.05);padding:3px 9px;border-radius:20px;border:1px solid var(--border)}
.focus-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;background:var(--teal);color:#000;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Outfit',sans-serif;transition:opacity .2s}
.focus-btn:hover{opacity:.85}
.day-mini{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;cursor:pointer;transition:all .18s}
.day-mini:hover{transform:translateY(-2px)}
.day-hdr-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.day-big-title{font-size:24px;font-weight:700;letter-spacing:-.4px}
.wt-tag{font-size:14px;font-weight:700;padding:6px 14px;border-radius:8px;font-family:'IBM Plex Mono',monospace}
.day-meta-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:10px}
.meta-pill{font-size:12px;color:var(--text-2);background:var(--card);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}
.module-list{display:flex;flex-direction:column;gap:10px}
.mod-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:14px}
.mod-card:hover{border-color:var(--border-hover);transform:translateY(-1px);background:#1f2235}
.mod-card.done{border-color:rgba(0,201,167,.3)}
.mod-num-box{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'IBM Plex Mono',monospace;text-align:center;line-height:1.3}
.mod-info-col{flex:1;min-width:0}
.mod-title-txt{font-size:13.5px;font-weight:600;margin-bottom:3px}
.mod-topics-txt{font-size:11.5px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mod-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mod-dur{font-size:11px;color:var(--text-3);font-family:'IBM Plex Mono',monospace}
.mod-status{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}
.s-avail{background:rgba(77,158,255,.1);color:var(--blue)}
.s-done{background:rgba(0,201,167,.1);color:var(--teal)}
.s-prog{background:rgba(245,158,11,.1);color:var(--amber)}
.btn-sm{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:all .15s;font-family:'Outfit',sans-serif}
.btn-sm:hover{background:var(--surface)}
.btn-primary{background:var(--teal);color:#000;border-color:var(--teal)}
.btn-primary:hover{opacity:.86}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.25)}
.section-ttl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-2);margin-bottom:14px;margin-top:26px}
.section-ttl:first-child{margin-top:0}
.welcome-banner{background:linear-gradient(135deg,rgba(0,201,167,.07),rgba(77,158,255,.07));border:1px solid rgba(0,201,167,.18);border-radius:14px;padding:24px;margin-bottom:22px}
.date-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 12px;font-size:13px;font-family:'Outfit',sans-serif}
.date-input:focus{outline:none;border-color:var(--teal)}
.coming-soon-wrap{max-width:480px;margin:60px auto;text-align:center}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:2px}

/* ══ REVIEW QUEUE ══ */
.rq-wrap{max-width:680px}
.rq-hero{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;margin-bottom:18px}
.rq-count-ring{width:88px;height:88px;border-radius:50%;border:3px solid var(--purple);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--purple)}
.rq-count-num{font-size:30px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1}
.rq-count-lbl{font-size:10px;color:var(--text-2);margin-top:2px}
.rq-empty{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 32px;text-align:center}
.rq-session-wrap{max-width:680px}
.rq-prog-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:22px;overflow:hidden}
.rq-prog-fill{height:100%;background:var(--purple);border-radius:2px;transition:width .4s ease}
.rq-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;margin-bottom:14px}
.rq-card-meta{font-size:11px;color:var(--text-3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.rq-interval-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(139,92,246,.12);color:var(--purple)}
.rq-confidence{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.conf-btn{flex:1;min-width:80px;padding:10px 8px;border-radius:10px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12.5px;font-weight:600;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:3px}
.conf-btn:hover{transform:translateY(-1px)}
.conf-btn .conf-icon{font-size:20px}
.conf-btn .conf-label{font-size:11px;font-weight:600}
.conf-btn .conf-sub{font-size:10px;opacity:.7}
.conf-easy{color:var(--teal);border-color:rgba(0,201,167,.3)}
.conf-easy:hover{background:rgba(0,201,167,.08);border-color:var(--teal)}
.conf-hard{color:var(--amber);border-color:rgba(245,158,11,.3)}
.conf-hard:hover{background:rgba(245,158,11,.08);border-color:var(--amber)}
.conf-miss{color:var(--red);border-color:rgba(239,68,68,.3)}
.conf-miss:hover{background:rgba(239,68,68,.08);border-color:var(--red)}
.sr-session-result{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center}
.due-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(139,92,246,.12);color:var(--purple);cursor:pointer}
.due-badge:hover{background:rgba(139,92,246,.2)}

/* ══ WEAK AREA PANEL ══ */
.weak-panel{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:16px 18px;margin-bottom:22px}
.weak-panel-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.weak-panel-title{font-size:13px;font-weight:600;color:var(--red)}
.weak-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(239,68,68,.1)}
.weak-item:last-child{border-bottom:none}
.weak-name{font-size:12.5px;flex:1}
.weak-score{font-size:12px;color:var(--red);font-family:'IBM Plex Mono',monospace;font-weight:600}
.weak-action{font-size:11px;color:var(--blue);cursor:pointer;text-decoration:underline;white-space:nowrap}
.nav-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:8px;font-size:10px;font-weight:700;background:var(--purple);color:#fff;margin-left:auto}

/* ══ EXAM SIMULATOR ══ */
.exam-pre{max-width:600px;margin:0 auto}
.exam-rule-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}
.exam-rule-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.exam-rule-icon{font-size:20px;margin-bottom:6px}
.exam-rule-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);margin-bottom:3px}
.exam-rule-val{font-size:14px;font-weight:600;color:var(--text)}
.exam-gen-wrap{max-width:560px;margin:0 auto;text-align:center;padding:40px 20px}
.exam-gen-domain{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:var(--card);border:1px solid var(--border);margin-bottom:8px;font-size:13px;text-align:left}
.exam-gen-domain.active{border-color:var(--teal);background:rgba(0,201,167,.05)}
.exam-gen-domain.done{border-color:rgba(0,201,167,.3);opacity:.7}
.exam-gen-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.exam-gen-spinner{width:12px;height:12px;border:1.5px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.exam-active-layout{display:flex;flex-direction:column;height:calc(100vh - 60px)}
.exam-topbar2{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.exam-timer{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;letter-spacing:.05em}
.exam-timer.warn{color:var(--amber)}
.exam-timer.crit{color:var(--red);animation:pulse 1s infinite}
.exam-flag-btn{font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:'Outfit',sans-serif;color:var(--text-2);transition:all .15s}
.exam-flag-btn.flagged{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.1);color:var(--amber)}
.exam-body{flex:1;overflow-y:auto;padding:22px 24px;display:grid;grid-template-columns:1fr 240px;gap:18px;align-items:start}
.exam-q-panel{}
.exam-grid-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:sticky;top:0}
.exam-grid-title{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.exam-q-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin-bottom:10px}
.eq-cell{width:100%;aspect-ratio:1;border-radius:4px;background:var(--surface);border:1px solid var(--border);font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;font-family:'IBM Plex Mono',monospace;color:var(--text-3)}
.eq-cell.answered{background:rgba(0,201,167,.12);border-color:rgba(0,201,167,.3);color:var(--teal)}
.eq-cell.flagged{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.35);color:var(--amber)}
.eq-cell.current{background:var(--blue);border-color:var(--blue);color:#fff}
.exam-grid-legend{display:flex;flex-wrap:wrap;gap:5px}
.egl-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text-3)}
.egl-dot{width:8px;height:8px;border-radius:2px}
.exam-q-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:12px}
.exam-q-num{font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.exam-q-domain-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.exam-nav-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 24px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.exam-submit-btn{padding:9px 22px;background:var(--teal);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s}
.exam-submit-btn:hover{opacity:.86}
.exam-result-wrap{max-width:800px}
.exam-score-hero{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;margin-bottom:18px}
.exam-score-ring{width:110px;height:110px;border-radius:50%;border:4px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 18px}
.exam-score-num{font-size:36px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1}
.exam-score-denom{font-size:13px;color:var(--text-2);margin-top:2px}
.exam-domain-result{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.exam-domain-result:last-child{border-bottom:none}
.er-review-row{display:flex;align-items:flex-start;gap:9px;padding:8px 6px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px;transition:background .15s}
.er-review-row:hover{background:rgba(255,255,255,.03)}
.er-review-row:last-child{border-bottom:none}
.er-num{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text-3);width:26px;flex-shrink:0;padding-top:2px}
.er-q{font-size:12.5px;color:var(--text-2);flex:1;line-height:1.5}
.er-flag{font-size:11px;color:var(--amber);flex-shrink:0;padding-top:2px}

/* ══ ANALYTICS ══ */
.analytics-wrap{max-width:900px}
.an-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.an-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.an-section{margin-bottom:26px}
.an-section-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-2);margin-bottom:14px}
.exam-hist-bar{display:flex;align-items:flex-end;gap:5px;height:70px;margin-top:10px}
.hist-bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.hist-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;transition:height .4s}
.hist-bar-label{font-size:9px;color:var(--text-3);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.module-acc-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.module-acc-row:last-child{border-bottom:none}
.acc-mod-name{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acc-bar-track{width:80px;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;flex-shrink:0}
.acc-bar-fill{height:100%;border-radius:3px}
.acc-pct{font-size:11px;font-family:'IBM Plex Mono',monospace;width:30px;text-align:right;flex-shrink:0}

/* ══ MODULE DETAIL ══ */
.mod-detail{max-width:720px}
.mod-back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--text-2);cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;transition:color .15s;margin-bottom:22px;padding:0}
.mod-back-btn:hover{color:var(--text)}
.mod-header-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 26px;margin-bottom:18px}
.obj-tag{display:inline-flex;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px;background:rgba(255,255,255,.06);color:var(--text-2);letter-spacing:.06em}
.mod-detail-ttl{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:7px;line-height:1.3}
.mod-detail-desc{font-size:13px;color:var(--text-2);line-height:1.75;margin-bottom:16px}
.topic-chip{font-size:12px;color:var(--text);background:rgba(255,255,255,.06);padding:5px 12px;border-radius:8px;border:1px solid var(--border);display:inline-flex}

/* ══ MASTERY LESSON ENGINE ══ */

/* Page chrome */
.ml-wrap{max-width:720px}
.ml-page-dots{display:flex;align-items:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.ml-dot{width:28px;height:4px;border-radius:2px;background:var(--border);transition:all .25s;cursor:pointer}
.ml-dot.active{background:var(--teal);width:36px}
.ml-dot.done{background:rgba(0,201,167,.4)}
.ml-page-label{font-size:11px;color:var(--text-3);margin-left:6px;font-family:'IBM Plex Mono',monospace}
.ml-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:18px}
.ml-prev{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--text-2);background:none;border:1px solid var(--border);padding:7px 14px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.ml-prev:hover{color:var(--text);border-color:var(--border-hover)}
.ml-prev:disabled{opacity:.3;cursor:default}
.ml-next{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#000;background:var(--teal);border:none;padding:9px 20px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s}
.ml-next:hover{opacity:.86}

/* Page 1 — Hook */
.ml-hook{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px}
.ml-hook-banner{padding:26px 28px 20px;border-bottom:1px solid var(--border)}
.ml-hook-eyebrow{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;opacity:.8}
.ml-hook-analogy{font-size:19px;font-weight:700;letter-spacing:-.3px;line-height:1.45;color:var(--text);margin-bottom:0}
.ml-hook-body{padding:20px 28px}
.ml-hook-why{font-size:13.5px;color:var(--text-2);line-height:1.8;margin-bottom:14px}
.ml-real-world{background:rgba(77,158,255,.06);border:1px solid rgba(77,158,255,.18);border-radius:10px;padding:14px 16px}
.ml-rw-label{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.ml-rw-text{font-size:13px;color:var(--text-2);line-height:1.7}

/* Page 2 — Concepts */
.ml-concept{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:12px}
.ml-concept-title{font-size:15px;font-weight:700;margin-bottom:8px;letter-spacing:-.2px}
.ml-simple{font-size:14px;color:var(--text);line-height:1.75;margin-bottom:10px;padding:12px 14px;background:rgba(0,201,167,.05);border-left:3px solid var(--teal);border-radius:0 8px 8px 0}
.ml-detail{font-size:13px;color:var(--text-2);line-height:1.85}
/* Visual: comparison table */
.ml-compare{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-radius:10px;overflow:hidden;margin:14px 0}
.ml-compare-cell{padding:11px 14px;background:var(--surface);font-size:12.5px;line-height:1.5}
.ml-compare-hdr{font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:8px 14px;background:var(--bg)}
/* Visual: flow steps */
.ml-flow{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:14px 0}
.ml-flow-step{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:500;white-space:nowrap}
.ml-flow-arrow{color:var(--text-3);font-size:16px;flex-shrink:0}
/* Visual: icon list */
.ml-ilist{display:flex;flex-direction:column;gap:7px;margin:12px 0}
.ml-ilist-row{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text-2);line-height:1.6}
.ml-ilist-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* Page 3 — Traps */
.ml-trap{border-radius:12px;overflow:hidden;margin-bottom:12px;border:1px solid}
.ml-trap-misconception{padding:14px 16px;display:flex;align-items:flex-start;gap:10px}
.ml-trap-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:20px;flex-shrink:0;margin-top:1px}
.ml-trap-text{font-size:13.5px;line-height:1.65}
.ml-trap-reality{padding:13px 16px;border-top:1px solid;font-size:13px;color:var(--text-2);line-height:1.7}
.ml-trap-exam{padding:10px 16px;border-top:1px solid;font-size:12px;line-height:1.6;font-style:italic}
.trap-wrong{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.04)}
.trap-wrong .ml-trap-misconception{background:rgba(239,68,68,.06)}
.trap-wrong .ml-trap-badge{background:rgba(239,68,68,.15);color:var(--red)}
.trap-wrong .ml-trap-text{color:var(--red)}
.trap-wrong .ml-trap-reality{border-color:rgba(239,68,68,.15)}
.trap-wrong .ml-trap-exam{border-color:rgba(239,68,68,.12);color:var(--text-3)}

/* Page 4 — Flashcards */
.ml-fc-area{perspective:1200px;margin-bottom:16px}
.ml-fc{width:100%;min-height:200px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.ml-fc.flipped{transform:rotateY(180deg)}
.ml-fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.ml-fc-front{background:var(--card)}
.ml-fc-back{background:var(--surface);transform:rotateY(180deg)}
.ml-fc-hint{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}
.ml-fc-term{font-size:20px;font-weight:700;letter-spacing:-.3px;color:var(--text);line-height:1.3}
.ml-fc-def{font-size:14px;color:var(--text-2);line-height:1.75}
.ml-fc-example{font-size:12px;color:var(--text-3);margin-top:10px;font-style:italic;line-height:1.6}
.ml-fc-nav{display:flex;align-items:center;gap:12px;justify-content:center;margin-top:10px}
.ml-fc-dots{display:flex;gap:5px}
.ml-fc-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .2s}
.ml-fc-dot.active{background:var(--teal)}
.ml-fc-dot.seen{background:rgba(0,201,167,.35)}
.ml-fc-counter{font-size:12px;color:var(--text-3);font-family:'IBM Plex Mono',monospace}

/* Page 5 — Matching game */
.ml-match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ml-match-col-hdr{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;padding-left:4px}
.ml-match-col{display:flex;flex-direction:column;gap:7px}
.ml-match-item{padding:11px 14px;border-radius:9px;border:1px solid var(--border);font-size:13px;cursor:pointer;transition:all .18s;line-height:1.45;user-select:none;background:var(--card)}
.ml-match-item:hover{border-color:var(--border-hover)}
.ml-match-item.selected{border-color:var(--blue);background:rgba(77,158,255,.08);color:var(--blue)}
.ml-match-item.matched{border-color:rgba(0,201,167,.4);background:rgba(0,201,167,.07);color:var(--teal);cursor:default}
.ml-match-item.wrong{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.07);animation:shake .3s ease}
.ml-match-item.disabled{opacity:.4;cursor:default}
.ml-match-score{text-align:center;padding:14px;font-size:14px;font-weight:600}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* Page 6 — Summary & exam tips */
.ml-summary-text{font-size:14px;color:var(--text-2);line-height:1.85;margin-bottom:16px;padding:18px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.ml-tip{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);border-radius:10px;margin-bottom:9px}
.ml-tip-num{width:22px;height:22px;border-radius:6px;background:var(--amber);color:#000;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ml-tip-text{font-size:13px;color:var(--text-2);line-height:1.7}
.ml-tip-text strong{color:var(--text)}
.ml-kp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.ml-kp-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 13px;font-size:12.5px;color:var(--text-2);line-height:1.55;display:flex;align-items:flex-start;gap:8px}
.ml-kp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ml-complete-banner{background:rgba(0,201,167,.07);border:1px solid rgba(0,201,167,.25);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-top:18px}

/* Shared */
.exam-tip-box{padding:18px 22px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:12px;margin-bottom:18px}
.exam-tip-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
.exam-tip-text{font-size:13px;color:var(--text-2);line-height:1.75}

/* ══ BOOST PARALLEL LOADER ══ */
.boost-loader{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:520px;margin:0 auto}
.boost-title{font-size:16px;font-weight:700;margin-bottom:4px;letter-spacing:-.2px}
.boost-sub{font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:22px}
.boost-streams{display:flex;flex-direction:column;gap:12px}
.boost-stream{display:flex;flex-direction:column;gap:6px}
.boost-stream-hdr{display:flex;align-items:center;justify-content:space-between}
.boost-stream-label{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}
.boost-stream-status{font-size:11px;font-family:'IBM Plex Mono',monospace}
.boost-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.boost-fill{height:100%;border-radius:3px;transition:width .35s ease}
@keyframes boost-pulse{0%,100%{opacity:1}50%{opacity:.45}}
.boost-fill.running{animation:boost-pulse 1.1s ease-in-out infinite}
.boost-divider{height:1px;background:var(--border);margin:14px 0}
.boost-total{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.boost-eta{font-size:11px;color:var(--text-3);font-family:'IBM Plex Mono',monospace}

/* partial-ready pill */
.partial-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(0,201,167,.1);color:var(--teal);margin-bottom:12px}
.partial-spinner{width:9px;height:9px;border:1.5px solid rgba(0,201,167,.3);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* ══ LOADING ══ */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 30px;text-align:center}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-size:15px;font-weight:600;margin-bottom:6px}
.loading-sub{font-size:12.5px;color:var(--text-2);line-height:1.6;max-width:320px}
.loading-steps{display:flex;flex-direction:column;gap:5px;margin-top:16px;text-align:left}
.step-item{font-size:12px;color:var(--text-3);display:flex;align-items:center;gap:7px}
.step-item.active{color:var(--teal)}
.step-item.done{color:var(--text-2)}
.step-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ══ QUIZ ══ */
.quiz-wrap{max-width:720px}
.quiz-progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:22px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .4s ease}
.quiz-meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.quiz-counter{font-size:12px;color:var(--text-2);font-family:'IBM Plex Mono',monospace}
.quiz-score-live{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--card);border:1px solid var(--border)}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;margin-bottom:14px}
.q-number{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.q-text{font-size:15px;font-weight:500;line-height:1.65;color:var(--text)}
.options-list{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.02);cursor:pointer;transition:all .18s;text-align:left;width:100%;font-family:'Outfit',sans-serif;font-size:13.5px;color:var(--text);line-height:1.5}
.opt-btn:hover:not(:disabled){border-color:var(--border-hover);background:rgba(255,255,255,.04)}
.opt-btn:disabled{cursor:default}
.opt-btn.selected{border-color:var(--amber);background:rgba(245,158,11,.06)}
.opt-btn.correct{border-color:var(--teal);background:rgba(0,201,167,.08);color:var(--teal)}
.opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.07);color:var(--red);opacity:.8}
.opt-btn.reveal-correct{border-color:var(--teal);background:rgba(0,201,167,.06)}
.opt-label{width:22px;height:22px;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;font-family:'IBM Plex Mono',monospace;transition:all .18s}
.opt-btn.correct .opt-label{background:var(--teal);color:#000;border-color:var(--teal)}
.opt-btn.wrong .opt-label{background:var(--red);color:#fff;border-color:var(--red)}
.opt-btn.reveal-correct .opt-label{background:rgba(0,201,167,.2);color:var(--teal);border-color:var(--teal)}
.feedback-box{padding:16px 18px;border-radius:10px;margin-top:14px;font-size:13px;line-height:1.75;animation:fadeUp .25s ease}
.feedback-box.correct{background:rgba(0,201,167,.07);border:1px solid rgba(0,201,167,.25);color:var(--text)}
.feedback-box.wrong{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:var(--text)}
.feedback-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.feedback-box.correct .feedback-label{color:var(--teal)}
.feedback-box.wrong .feedback-label{color:var(--red)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.next-q-btn{display:flex;align-items:center;gap:7px;padding:11px 22px;background:var(--teal);color:#000;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s;margin-top:4px}
.next-q-btn:hover{opacity:.85}

/* ══ RESULT ══ */
.result-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;margin-bottom:18px}
.result-score-ring{width:100px;height:100px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;border:3px solid}
.result-big-num{font-size:32px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1}
.result-denom{font-size:13px;color:var(--text-2);margin-top:2px}
.result-verdict{font-size:20px;font-weight:700;margin-bottom:6px}
.result-sub{font-size:13px;color:var(--text-2);line-height:1.7;max-width:460px;margin:0 auto 22px}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.result-breakdown{margin-top:20px;border-top:1px solid var(--border);padding-top:18px}
.rb-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.rb-row:last-child{border-bottom:none}
.rb-q{flex:1;font-size:12.5px;color:var(--text-2);text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rb-icon{font-size:14px;flex-shrink:0}

@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}.card-row{grid-template-columns:1fr}}
@media(max-width:640px){.sidebar{display:none}.content{padding:18px 16px}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon">D+</div>
      <div class="logo-name">DataPath</div>
    </div>
    <div class="logo-sub">CompTIA Data+ · DA0-001</div>
  </div>
  <nav class="nav-section">
    <div class="nav-label">Main</div>
    <div class="nav-item" id="nav-dashboard" onclick="go('dashboard')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".7"/></svg>
      Dashboard
    </div>
  </nav>
  <nav class="nav-section" style="flex:1">
    <div class="nav-label">7-Day Programme</div>
    <div id="day-nav-list"></div>
  </nav>
  <nav class="nav-section">
    <div class="nav-label">Tools</div>
    <div class="nav-item" id="nav-exam" onclick="go('exam')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 4.5v3.5l2.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Practice Exam
    </div>
    <div class="nav-item" id="nav-analytics" onclick="go('analytics')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2 12.5L5.5 8l3 3 5.5-8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Analytics
    </div>
    <div class="nav-item" id="nav-review" onclick="go('review')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M2.5 8a5.5 5.5 0 1 1 .8 2.9M2.5 13.5V9H7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Review Queue
      <span id="nav-review-badge" style="display:none" class="nav-badge">0</span>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
      <span style="font-size:11px;color:var(--text-2)">Overall progress</span>
      <span style="font-size:11px;color:var(--text);font-family:'IBM Plex Mono',monospace" id="sb-prog-label">0 / 28</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="sb-prog-fill" style="width:0%"></div></div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="topbar-right">
      <div id="save-indicator" style="display:none;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--teal);transition:opacity .4s"></div>
      <div class="badge badge-amber">
        <span style="font-size:13px">🔥</span>
        <span id="streak-val">0</span> day streak
      </div>
      <div class="badge badge-teal">
        <div class="dot-live"></div>
        <span id="countdown-val">Set exam date</span>
      </div>
    </div>
  </div>
  <div class="content" id="main-content"></div>
</div>
</div>

<script>
const QUIZ_BANK = {
  "d1m1": [
    {
      "q": "A company needs to run complex quarterly analytical reports across years of historical sales data. Which system is most appropriate?",
      "opts": [
        "OLTP database",
        "Data warehouse",
        "NoSQL document store",

    done:ST.done,inprog:ST.inprog,mastery:ST.mastery,
    streak:ST.streak,lastActive:ST.lastActive,examDate:ST.examDate,
    quizScores:ST.quizScores,srCards:ST.srCards,examHistory:ST.examHistory
  };
  const cache={lessonCache:ST.lessonCache,quizCache:ST.quizCache};
  const progStr=JSON.stringify(prog);
  const cacheStr=JSON.stringify(cache);

  // Always write localStorage immediately (fast, synchronous)
  try{localStorage.setItem(PROG_KEY,progStr);}catch(e){}
  try{localStorage.setItem(CACHE_KEY,cacheStr);}catch(e){}

  // Debounce cloud write — coalesce rapid saves into one call
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    let ok=false;
    if(window.storage){
      try{
        await window.storage.set(PROG_KEY,progStr);
        await window.storage.set(CACHE_KEY,cacheStr);
        _cloudOk=true;ok=true;
      }catch(e){_cloudOk=false;}
    }
    showSaved(ok);
  },400);
}

// ── Load ───────────────────────────────────────────
async function loadState(){
  let prog=EMPTY_PROG(),cache=EMPTY_CACHE();

  // Try window.storage first (most reliable across sessions)
  if(window.storage){
    try{
      const pr=await window.storage.get(PROG_KEY);
      if(pr&&pr.value){prog={...prog,...JSON.parse(pr.value)};_cloudOk=true;}
    }catch(e){}
    try{
      const cr=await window.storage.get(CACHE_KEY);
      if(cr&&cr.value){cache={...cache,...JSON.parse(cr.value)};}
    }catch(e){}
  }

  // Fall back to localStorage for anything missing
  if(!_cloudOk){
    try{
      const lp=localStorage.getItem(PROG_KEY)||localStorage.getItem('dp_state_v2');
      if(lp){const p=JSON.parse(lp);prog={...prog,...p};}
    }catch(e){}
    try{
      const lc=localStorage.getItem(CACHE_KEY);
      if(lc){const c=JSON.parse(lc);cache={...cache,...c};}
    }catch(e){}
  }

  // Migrate old combined key (dp_state_v2) if present
  try{
    const old=localStorage.getItem('dp_state_v2');
    if(old){
      const o=JSON.parse(old);
      if(o.lessonCache&&Object.keys(cache.lessonCache).length===0)cache.lessonCache=o.lessonCache;
      if(o.quizCache&&Object.keys(cache.quizCache).length===0)cache.quizCache=o.quizCache;
    }
  }catch(e){}

  ST={...prog,...cache};
}

// quality: 5=perfect, 4=correct easy, 3=correct hard, 1=wrong, 0=blackout
function sm2Update(card,quality){
  let{interval,repetition,ef}=card;
  if(quality>=3){
    if(repetition===0)interval=1;
    else if(repetition===1)interval=6;
    else interval=Math.round(interval*ef);
    repetition++;
  }else{
    interval=1;repetition=0;
  }
  ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
  if(ef<1.3)ef=1.3;
  const nextReview=Date.now()+interval*24*60*60*1000;
  return{interval,repetition,ef:parseFloat(ef.toFixed(2)),nextReview};
}

function getCardId(modId,qIdx){return`${modId}_${qIdx}`;}

function registerWrongAnswer(modId,qIdx,qData){
  const id=getCardId(modId,qIdx);
  const existing=ST.srCards[id];
  if(existing){
    // Already in deck — reset to due now
    const updated=sm2Update(existing,0);
    ST.srCards[id]={...existing,...updated,lastResult:'fail'};
  }else{
    // New card — add to deck, due immediately
    ST.srCards[id]={
      modId,qIdx,
      q:qData.q,opts:qData.opts,correct:qData.correct,explanation:qData.explanation,
      interval:1,repetition:0,ef:2.5,
      nextReview:Date.now(),lastResult:'fail'
    };
  }
  saveState();
}

function registerCorrectAnswer(modId,qIdx){
  const id=getCardId(modId,qIdx);
  if(ST.srCards[id]){
    const updated=sm2Update(ST.srCards[id],4);
    ST.srCards[id]={...ST.srCards[id],...updated,lastResult:'pass'};
    saveState();
  }
}

function getDueCards(){
  const now=Date.now();
  return Object.entries(ST.srCards)
    .filter(([,c])=>c.nextReview<=now)
    .sort((a,b)=>a[1].nextReview-b[1].nextReview)
    .map(([id,c])=>({id,...c}));
}

function getAllSRCards(){
  return Object.entries(ST.srCards).map(([id,c])=>({id,...c}));
}

function srDueCount(){return getDueCards().length;}

function srIntervalLabel(days){
  if(days<=1)return'Due now';
  if(days<7)return`${days}d`;
  if(days<30)return`${Math.round(days/7)}w`;
  return`${Math.round(days/30)}mo`;
}

// ════════════════════════════════════════════════════
// AI ENGINE
// ════════════════════════════════════════════════════
async function callClaude(prompt,maxTokens=2400,timeoutMs=40000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
  let res;
  try{
    res=await fetch('https://api.anthropic.com/v1/messages',{
      signal:ctrl.signal,
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:maxTokens,
        messages:[{role:'user',content:prompt}]
      })
    });
  }catch(netErr){
    clearTimeout(tid);
    if(netErr.name==='AbortError')throw new Error('Request timed out after '+Math.round(timeoutMs/1000)+'s — try again');
    throw new Error('Network error: '+netErr.message);
  }
  clearTimeout(tid);
  if(!res.ok){
    let body='';
    try{const j=await res.json();body=j?.error?.message||JSON.stringify(j);}catch(e){}
    throw new Error('API '+res.status+(body?' — '+body.slice(0,140):''));
  }
  const data=await res.json();
  if(data.error)throw new Error('Claude error: '+data.error.message);
  if(data.stop_reason==='max_tokens')throw new Error('Response truncated (max_tokens hit) — this is a bug, please report');
  const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  if(!text)throw new Error('Empty response from Claude');
  // Strip markdown fences
  let clean=text.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
  // Attempt parse; if it fails, try to recover truncated JSON
  try{return JSON.parse(clean);}
  catch(pe){
    // Try to recover: close any open braces/brackets
    let recovered=clean;
    const opens=[...recovered].filter(c=>c==='{').length;
    const closes=[...recovered].filter(c=>c==='}').length;
    const arrOpens=[...recovered].filter(c=>c==='[').length;
    const arrCloses=[...recovered].filter(c=>c===']').length;
    // Strip trailing incomplete string/value
    recovered=recovered.replace(/,\s*"[^"]*$/, '').replace(/,\s*$/, '');
    for(let i=0;i<arrOpens-arrCloses;i++)recovered+=']';
    for(let i=0;i<opens-closes;i++)recovered+='}';
    try{return JSON.parse(recovered);}
    catch(pe2){throw new Error('JSON parse failed. Response was: '+clean.slice(0,200));}
  }
}

// ─── startLesson: check LESSON_BANK first, then cache, then generate ───
async function startLesson(modId){
  const mod=ALL_MODS.find(m=>m.id===modId);
  if(!mod)return;

  // Ensure MS is tracking the right module
  if(MS.modId!==modId){
    MS={modId,phase:'intro',lesson:null,questions:[],current:0,answers:[],revealed:false,
      lessonPage:0,fc:{idx:0,flipped:false},match:{sel:null,solvedTerms:[],solvedDefs:[],wrong:null},
      genState:{a:'idle',b:'idle',aMs:0,bMs:0,startMs:0}};
  }

  // 1. Serve from persistent cache (user has already seen this lesson)
  if(ST.lessonCache[modId]){
    MS.lesson=ST.lessonCache[modId];
    MS.phase='lesson';
    MS.lessonPage=0;
    render();
    return;
  }

  // 2. Serve from hardcoded LESSON_BANK (instant, no API call)
  if(typeof LESSON_BANK!=='undefined' && LESSON_BANK[modId]){
    const lesson=LESSON_BANK[modId];
    MS.lesson=lesson;
    MS.phase='lesson';
    MS.lessonPage=0;
    ST.lessonCache[modId]=lesson; // save to cache so it persists
    saveState();
    render();
    return;
  }

  // Set loading state and trigger FULL render immediately (bulletproof)
  MS.phase='loading_lesson';
  MS.genState={a:'running',b:'running',aMs:0,bMs:0,startMs:Date.now()};
  render(); // use full render so #module-engine is always in the DOM

  // Animate progress bars every 200ms
  const tickRef=setInterval(()=>{
    const elapsed=Date.now()-MS.genState.startMs;
    if(MS.genState.a==='running') MS.genState.aMs=Math.min(elapsed,7000);
    if(MS.genState.b==='running') MS.genState.bMs=Math.min(elapsed,7000);
    const el=document.getElementById('boost-loader-area');
    if(el) el.innerHTML=renderBoostLoader();
  },200);

  let partA=null,partB=null;

  let errA=null,errB=null;

  const callA=generateLessonA(mod).then(data=>{
    partA=data;
    MS.genState.a='done';
    MS.genState.aMs=Date.now()-MS.genState.startMs;
    // Progressive reveal — show pages 1-3 immediately
    if(partB===null){
      MS.lesson={...partA,flashcards:[],matching:[],exam_tips:[],summary:'',key_points:[]};
      MS.phase='lesson_partial';
      MS.lessonPage=0;
      patchModuleContent(renderModuleContent(mod));
    }
  }).catch(e=>{errA=e;MS.genState.a='done';});

  const callB=generateLessonB(mod).then(data=>{
    partB=data;
    MS.genState.b='done';
    MS.genState.bMs=Date.now()-MS.genState.startMs;
  }).catch(e=>{errB=e;MS.genState.b='done';});

  try{
    await Promise.all([callA,callB]);
    clearInterval(tickRef);
    if(!partA&&!partB){throw new Error('Both calls failed');}
    const lesson={...partA,...partB};
    MS.lesson=lesson;
    MS.phase='lesson';
    ST.lessonCache[modId]=lesson;
    saveState();
  }catch(e){
    clearInterval(tickRef);
    const realErr=errA||errB||e;
    if(partA){
      MS.lesson={...partA,flashcards:[],matching:[],exam_tips:['Lesson partially generated. Regenerate for full content.'],summary:'Partial generation — click Regenerate.',key_points:[]};
      MS.phase='lesson';
    }else{
      MS.phase='lesson_error';
      MS._lastError=realErr?.message||'Unknown error';
    }
  }
  patchModuleContent(renderModuleContent(mod));
}

// ─── Boost loader renderer (patched in-place during generation) ───
function renderBoostLoader(){
  const g=MS.genState;
  const elapsed=Math.round((Date.now()-g.startMs)/100)/10;
  const TIMEOUT=30000; // max ms per call

  const aW=g.a==='done'?100:Math.round(Math.min((g.aMs/TIMEOUT)*95,94));
  const bW=g.b==='done'?100:Math.round(Math.min((g.bMs/TIMEOUT)*95,94));
  const totalW=Math.round((aW+bW)/2);

  const streamHtml=(label,icon,color,state,pct,pages)=>{
    const statusText=state==='done'?`<span style="color:${color};font-weight:600">✓ Ready</span>`:
      `<span style="color:var(--text-3)">${pct}%</span>`;
    return`<div class="boost-stream">
      <div class="boost-stream-hdr">
        <div class="boost-stream-label">
          <span style="font-size:15px">${icon}</span>
          <span style="color:var(--text)">${label}</span>
          <span style="font-size:10px;color:var(--text-3);font-weight:400">${pages}</span>
        </div>
        ${statusText}
      </div>
      <div class="boost-track">
        <div class="boost-fill${state==='running'?' running':''}" style="width:${pct}%;background:${color}"></div>
      </div>
    </div>`;
  };

  return`
    ${streamHtml('Hook · Concepts · Traps','🧠',g.a==='done'?'var(--teal)':'var(--blue)',g.a,aW,'Pages 1–3')}
    ${streamHtml('Flashcards · Matching · Tips','🎮',g.b==='done'?'var(--teal)':'var(--purple)',g.b,bW,'Pages 4–6')}
    <div class="boost-divider"></div>
    <div class="boost-total">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="boost-track" style="width:180px"><div class="boost-fill" style="width:${totalW}%;background:var(--teal)"></div></div>
        <span style="font-size:12px;color:var(--text-2)">${totalW}%</span>
      </div>
      <div class="boost-eta">${elapsed}s</div>
    </div>`;
}

async function startQuiz(modId){
  const mod=ALL_MODS.find(m=>m.id===modId);
  MS.current=0;MS.answers=[];MS.revealed=false;

  // 1. Serve from persistent quiz cache
  if(ST.quizCache[modId]){
    MS.questions=ST.quizCache[modId];
    MS.phase='quiz';
    patchModuleContent(renderModuleContent(mod));
    return;
  }

  // 2. Serve from hardcoded QUIZ_BANK — instant, no API call
  if(typeof QUIZ_BANK!=='undefined'&&QUIZ_BANK[modId]){
    MS.questions=QUIZ_BANK[modId];
    MS.phase='quiz';
    ST.quizCache[modId]=QUIZ_BANK[modId];
    saveState();
    patchModuleContent(renderModuleContent(mod));
    return;
  }

  // 3. Fall back to API generation
  MS.phase='loading_quiz';
  patchModuleContent(renderModuleContent(mod));
  try{
    const questions=await generateQuiz(mod);
    ST.quizCache[modId]=questions;
    saveState();
    MS.questions=questions;
    MS.phase='quiz';
  }catch(e){
    MS.phase='quiz_error';
  }
  patchModuleContent(renderModuleContent(mod));
}

function selectAnswer(idx){
  if(MS.revealed)return;
  MS.revealed=true;
  const q=MS.questions[MS.current];
  const isCorrect=idx===q.correct;
  MS.answers.push({qIdx:MS.current,selected:idx,correct:isCorrect,q:q.q});

  // SM-2: register result
  if(isCorrect) registerCorrectAnswer(MS.modId,MS.current);
  else registerWrongAnswer(MS.modId,MS.current,q);

  // Animate options
  document.querySelectorAll('.opt-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===q.correct)btn.classList.add(i===idx?'correct':'reveal-correct');
    else if(i===idx)btn.classList.add('wrong');
  });

  // Show feedback
  const fb=document.getElementById('feedback-area');
  if(fb){
    fb.innerHTML=`<div class="feedback-box ${isCorrect?'correct':'wrong'}">
      <div class="feedback-label">${isCorrect?'✓ Correct':'✗ Incorrect'}</div>
      <div>${q.explanation}</div>
      ${!isCorrect?`<div style="font-size:11px;color:var(--purple);margin-top:6px">📌 Added to Review Queue for spaced repetition</div>`:''}
    </div>
    <button class="next-q-btn" onclick="nextQuestion()">
      ${MS.current<MS.questions.length-1?'Next question →':'See results →'}
    </button>`;
  }

}

function nextQuestion(){
  if(MS.current<MS.questions.length-1){
    MS.current++;MS.revealed=false;
    const mod=ALL_MODS.find(m=>m.id===MS.modId);
    patchModuleContent(renderModuleContent(mod));
  }else{
    finishQuiz();
  }
}

function finishQuiz(){
  const score=MS.answers.filter(a=>a.correct).length;
  const total=MS.questions.length;
  const pct=Math.round((score/total)*100);
  MS.phase='result';
  MS.score=score;

  ST.quizScores[MS.modId]={score,total,pct,ts:Date.now()};
  recalcMastery();

  if(pct>=60){
    if(!ST.done.includes(MS.modId)){
      ST.done.push(MS.modId);
      ST.inprog=ST.inprog.filter(x=>x!==MS.modId);
      updateStreak();
    }
  }
  saveState();
  const mod=ALL_MODS.find(m=>m.id===MS.modId);
  patchModuleContent(renderModuleContent(mod));
  renderSidebar();
}

function retryQuiz(modId){
  // Clear cache so a fresh quiz is generated via API (or re-served from QUIZ_BANK)
  delete ST.quizCache[modId];
  MS={modId,phase:'intro',lesson:MS.lesson,questions:[],current:0,answers:[],revealed:false,
    lessonPage:0,fc:{idx:0,flipped:false},match:{sel:null,solvedTerms:[],solvedDefs:[],wrong:null},
    genState:{a:'idle',b:'idle',aMs:0,bMs:0,startMs:0}};
  saveState();
  const mod=ALL_MODS.find(m=>m.id===modId);
  patchModuleContent(renderModuleContent(mod));
}

}

// Page 5 — Matching game
function mlPageMatching(l,c){
  const pairs=l.matching||[];
  if(!pairs.length)return'<p style="color:var(--text-2)">No matching pairs generated.</p>';
  const m=MS.match;
  const solved=m.solvedTerms.length;
  const allDone=solved===pairs.length;

  const termItems=pairs.map((p,i)=>{
    const isSolved=m.solvedTerms.includes(i);
    const isSelTerm=m.sel?.type==='term'&&m.sel.idx===i;
    const isWrong=m.wrong?.type==='term'&&m.wrong.idx===i;
    let cls='ml-match-item';
    if(isSolved)cls+=' matched disabled';
    else if(isSelTerm)cls+=' selected';
    else if(isWrong)cls+=' wrong';
    return`<div class="${cls}" onclick="mlMatchSelect('term',${i})">${p.term}</div>`;
  });

  // Shuffle defs on first render by using a stable shuffle based on modId
  let defOrder=pairs.map((_,i)=>i);
  // stable shuffle: use modId chars as seed
  const seed=MS.modId.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  for(let i=defOrder.length-1;i>0;i--){const j=(seed*(i+1))%i;[defOrder[i],defOrder[j]]=[defOrder[j],defOrder[i]];}

  const defItems=defOrder.map(i=>{
    const p=pairs[i];
    const isSolved=m.solvedDefs.includes(i);
    const isSelDef=m.sel?.type==='def'&&m.sel.idx===i;
    const isWrong=m.wrong?.type==='def'&&m.wrong.idx===i;
    let cls='ml-match-item';
    if(isSolved)cls+=' matched disabled';
    else if(isSelDef)cls+=' selected';
    else if(isWrong)cls+=' wrong';
    return`<div class="${cls}" onclick="mlMatchSelect('def',${i})">${p.definition}</div>`;
  });

  return`<div style="margin-bottom:14px">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px;letter-spacing:-.2px">🎮 Matching game</div>
    <div style="font-size:13px;color:var(--text-2);margin-bottom:14px">Match each term on the left to its definition on the right. ${allDone?'<strong style="color:var(--teal)">All matched! 🎉</strong>':'Click a term, then click its definition.'}</div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3)">Terms</div>
    <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3)">Definitions</div>
  </div>
  <div class="ml-match-grid">
    <div class="ml-match-col">${termItems.join('')}</div>
    <div class="ml-match-col">${defItems.join('')}</div>
  </div>
  ${allDone?`<div style="text-align:center;padding:14px;background:rgba(0,201,167,.07);border:1px solid rgba(0,201,167,.2);border-radius:10px;font-size:13px;font-weight:600;color:var(--teal)">🎯 Perfect! All ${pairs.length} pairs matched. Ready for the quiz.</div>`:`<div style="text-align:center;font-size:12px;color:var(--text-3)">${solved}/${pairs.length} matched</div>`}`;
}

function mlMatchSelect(type,idx){
  const m=MS.match;
  const pairs=MS.lesson.matching||[];
  // If already solved, ignore
  if(type==='term'&&m.solvedTerms.includes(idx))return;
  if(type==='def'&&m.solvedDefs.includes(idx))return;

  if(!m.sel){
    // First selection
    MS.match={...m,sel:{type,idx},wrong:null};
  }else if(m.sel.type===type){
    // Same column — switch selection
    MS.match={...m,sel:{type,idx},wrong:null};
  }else{
    // Cross-column attempt — check match
    const termIdx=type==='def'?m.sel.idx:idx;
    const defIdx=type==='def'?idx:m.sel.idx;
    if(termIdx===defIdx){
      // Correct!
      MS.match={sel:null,wrong:null,
        solvedTerms:[...m.solvedTerms,termIdx],
        solvedDefs:[...m.solvedDefs,defIdx]};
    }else{
      // Wrong — flash then clear
      MS.match={...m,sel:null,wrong:{type,idx}};
      setTimeout(()=>{MS.match={...MS.match,wrong:null};const mod=ALL_MODS.find(mm=>mm.id===MS.modId);patchModuleContent(renderModuleContent(mod));},500);
    }
  }
  const mod=ALL_MODS.find(mm=>mm.id===MS.modId);
  patchModuleContent(renderModuleContent(mod));
}

}
function renderExamFlagBtn(){
  const el=document.getElementById('exam-flag-btn');
  if(el){el.className='exam-flag-btn'+(EX.flagged.has(EX.current)?' flagged':'');el.textContent=EX.flagged.has(EX.current)?'🚩 Flagged':'⚑ Flag';}
}
function renderExamNav(){
  const el=document.getElementById('exam-answered-count');
  if(el)el.textContent=`${Object.keys(EX.answers).length}/${EX.questions.length} answered`;
}

function buildExamQuestion(){
  const q=EX.questions[EX.current];if(!q)return'';
  const c=q.domain>=0?DC[q.domain]:'var(--teal)';
  return`<div class="exam-q-card">
    <div class="exam-q-num">
      <span>Question ${EX.current+1} of ${EX.questions.length}</span>
      <span class="exam-q-domain-tag" style="background:${c}1a;color:${c}">${DS[q.domain]||'General'}</span>
    </div>
    <div class="q-text">${q.q}</div>
  </div>`;
}

function buildExamOptions(){
  const q=EX.questions[EX.current];if(!q)return'';
  const selected=EX.answers[EX.current];
  const labels=['A','B','C','D'];
  return`<div class="options-list">
    ${q.opts.map((opt,i)=>`<button class="opt-btn${selected===i?' selected':''}" onclick="examSelectAnswer(${i})">
      <div class="opt-label">${labels[i]}</div><div>${opt}</div>
    </button>`).join('')}
  </div>`;
}

function buildExamGridCells(){
  return EX.questions.map((_,i)=>{
    let cls='eq-cell';
    if(i===EX.current)cls+=' current';
    else if(EX.flagged.has(i))cls+=' flagged';
    else if(EX.answers[i]!==undefined)cls+=' answered';
    return`<div class="${cls}" data-q="${i}" onclick="examGoto(${i})">${i+1}</div>`;
  }).join('');
}

function submitExam(){
  if(EX.timerRef)clearInterval(EX.timerRef);
  EX.phase='result';
  // Score
  const total=EX.questions.length;
  let correct=0;
  const domainCorrect=[0,0,0,0,0],domainTotal=[0,0,0,0,0];
  EX.questions.forEach((q,i)=>{
    if(q.domain>=0&&q.domain<5){domainTotal[q.domain]++;}
    if(EX.answers[i]===q.correct){correct++;if(q.domain>=0&&q.domain<5)domainCorrect[q.domain]++;}
  });
  const scaled=Math.round((correct/total)*900);
  const pass=scaled>=675;
  const result={ts:Date.now(),score:correct,total,scaled,pass,domainCorrect,domainTotal,timeUsed:5400-EX.timeLeft};
  ST.examHistory.push(result);
  EX.result=result;
  // SR: add wrong answers
  EX.questions.forEach((q,i)=>{
    if(EX.answers[i]!==undefined&&EX.answers[i]!==q.correct){
      const eid=`exam_${ST.examHistory.length-1}_${i}`;
      ST.srCards[eid]={modId:'exam',qIdx:i,q:q.q,opts:q.opts,correct:q.correct,explanation:q.explanation,
        interval:1,repetition:0,ef:2.5,nextReview:Date.now(),lastResult:'fail'};
    }
  });
  recalcMastery();saveState();updateReviewBadge();
  renderExamContent();
}

function confirmSubmit(){
  const answered=Object.keys(EX.answers).length;
  const unanswered=EX.questions.length-answered;
  const flagged=EX.flagged.size;
  if(unanswered>0||flagged>0){
    if(!confirm(`${unanswered} unanswered, ${flagged} flagged. Submit anyway?`))return;
  }
  submitExam();
}

function renderExamContent(){
  const el=document.getElementById('exam-content');
  if(el)el.innerHTML=vExamContent();
}

          ${['💡 Hook','📖 Concepts','⚠️ Traps','🃏 Flashcards','🎮 Matching','📋 Tips'].map(s=>`<span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--text-2)">${s}</span>`).join('')}
        </div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button class="focus-btn" onclick="triggerLesson('${mod.id}')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M4.5 2.5l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Start mastery lesson
          </button>
          ${isDone?`<button class="btn-sm" style="color:var(--teal);border-color:rgba(0,201,167,.3)" onclick="retryQuiz('${mod.id}')">Retake quiz</button>`:''}
        </div>
        ${isDone?`<div style="margin-top:16px;font-size:12px;color:var(--teal)">✓ Module complete${ST.quizScores[mod.id]?' · Score: '+ST.quizScores[mod.id].score+'/'+ST.quizScores[mod.id].total:''}</div>`:''}
      </div>`;

    case 'loading_lesson': return`
      <div class="boost-loader">
        <div style="font-size:24px;margin-bottom:12px">⚡</div>
        <div class="boost-title">Parallel generation — 2× faster</div>
        <div class="boost-sub">Two AI calls running simultaneously. The lesson unlocks the moment the first one lands — no waiting for both.</div>
        <div class="boost-streams" id="boost-loader-area">
          ${renderBoostLoader()}
        </div>
      </div>`;

    case 'lesson_partial':{
      // Part A ready, Part B still loading — show lesson with a "loading" pill on pages 4-6
      const l=MS.lesson;if(!l)return'';
      const isPageLocked=MS.lessonPage>=3;
      return`<div class="ml-wrap">
        <div class="partial-pill"><div class="partial-spinner"></div>Pages 4–6 still loading…</div>
        ${mlPageChrome()}
        <div id="ml-page-content">
          ${MS.lessonPage===0?mlPageHook(l,c):''}
          ${MS.lessonPage===1?mlPageConcepts(l,c):''}
          ${MS.lessonPage===2?mlPageTraps(l):''}
          ${isPageLocked?`<div style="text-align:center;padding:40px;color:var(--text-3)">
            <div class="partial-spinner" style="margin:0 auto 12px;width:18px;height:18px;border-width:2px"></div>
            <div style="font-size:13px">Still generating flashcards, matching game, and exam tips…</div>
          </div>`:''}
        </div>
        ${MS.lessonPage<3?`<div class="ml-nav">
          <button class="ml-prev" onclick="mlGoPage(${MS.lessonPage-1})" ${MS.lessonPage===0?'disabled':''}>← Back</button>
          <button class="ml-next" style="background:${c}" onclick="mlGoPage(${MS.lessonPage+1})" ${MS.lessonPage>=2?'disabled style="opacity:.4"':''}>Next: ${MS.lessonPage<ML_PAGES.length-1?ML_PAGES[MS.lessonPage+1]:'Quiz'} →</button>
        </div>`:''}
      </div>`;
    }

    case 'lesson_error': return`
      <div style="background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:26px;text-align:center">
        <div style="font-size:24px;margin-bottom:10px">⚠️</div>
        <div style="font-size:14px;font-weight:600;color:var(--red);margin-bottom:6px">Generation failed</div>
        <div style="font-size:12px;color:var(--text-2);margin-bottom:4px;line-height:1.6;max-width:440px;margin-left:auto;margin-right:auto">${MS._lastError||'Check your internet connection and try again.'}</div>
        <div style="font-size:11px;color:var(--text-3);margin-bottom:18px">If this keeps happening, the lesson generator requires an active internet connection and access to the Anthropic API.</div>
        <div style="display:flex;gap:8px;justify-content:center">
          <button class="btn-sm btn-primary" onclick="triggerLesson('${mod.id}')">Try again</button>
          <button class="btn-sm" onclick="go('day',{day:${di+1}})">Back to day</button>
        </div>
      </div>`;

    case 'lesson':{
      const l=MS.lesson;
      if(!l)return'';
      return`<div class="ml-wrap">
        ${mlPageChrome()}
        <div id="ml-page-content">
          ${MS.lessonPage===0?mlPageHook(l,c):''}
          ${MS.lessonPage===1?mlPageConcepts(l,c):''}
          ${MS.lessonPage===2?mlPageTraps(l):''}
          ${MS.lessonPage===3?mlPageFlashcards(l,c):''}
          ${MS.lessonPage===4?mlPageMatching(l,c):''}
          ${MS.lessonPage===5?mlPageSummary(l,c,mod):''}
        </div>
        ${mlNavBar(mod,c)}
        <button class="btn-sm" style="margin-top:10px;font-size:11px" onclick="triggerLesson('${mod.id}')">↺ Regenerate lesson</button>
      </div>`;
    }

    case 'loading_quiz': return`
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-title">Generating quiz</div>
        <div class="loading-sub">Claude is writing 6 exam-style questions on <strong>${mod.title}</strong> — scenario-based, with plausible distractors.</div>
        <div class="loading-steps">
          <div class="step-item done"><div class="step-dot"></div>Lesson reviewed</div>
          <div class="step-item active"><div class="step-dot"></div>Writing questions</div>
          <div class="step-item"><div class="step-dot"></div>Adding explanations</div>
        </div>
      </div>`;

    case 'quiz_error': return`
      <div style="text-align:center;padding:40px">
        <div style="color:var(--red);font-size:14px;margin-bottom:12px">Failed to generate quiz — check your connection.</div>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="btn-sm btn-primary" onclick="startQuiz('${mod.id}')">Try again</button>
          <button class="btn-sm" onclick="MS.phase='lesson';patchModuleContent(renderModuleContent(ALL_MODS.find(m=>m.id==='${mod.id}')))">Back to lesson</button>
        </div>
      </div>`;

    case 'quiz':{
      const qs=MS.questions;if(!qs.length)return'';
      const q=qs[MS.current];
      const answered=MS.answers.length;
      const pct=Math.round(((MS.current)/(qs.length))*100);
      const labels=['A','B','C','D'];
      return`<div class="quiz-wrap">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
        <div class="quiz-meta-row">
          <div class="quiz-counter">Question ${MS.current+1} of ${qs.length}</div>
          <div class="quiz-score-live" style="color:${answered>0?(MS.answers.filter(a=>a.correct).length/answered)>=0.6?'var(--teal)':'var(--amber)':'var(--text-2)'}">
            ${MS.answers.filter(a=>a.correct).length}/${answered} correct
          </div>
        </div>
        <div class="question-card">
          <div class="q-number">Question ${MS.current+1}</div>
          <div class="q-text">${q.q}</div>
        </div>
        <div class="options-list">
          ${q.opts.map((opt,i)=>`<button class="opt-btn" onclick="selectAnswer(${i})">
            <div class="opt-label">${labels[i]}</div>
            <div>${opt}</div>
          </button>`).join('')}
        </div>
        <div id="feedback-area" style="margin-top:10px"></div>
      </div>`;
    }

    case 'result':{
      const score=MS.score,total=MS.questions.length;
      const pct=Math.round((score/total)*100);
      const pass=pct>=60;
      const color=pass?'var(--teal)':pct>=40?'var(--amber)':'var(--red)';
      const di2=CUR.findIndex(d=>d.mods.some(m=>m.id===mod.id));
      const d2=CUR[di2];
      const modIdx=d2.mods.findIndex(m=>m.id===mod.id);
      const nextMod=modIdx<d2.mods.length-1?d2.mods[modIdx+1]:null;
      const nextDay=di2<CUR.length-1?CUR[di2+1]:null;
      const wrongCount=MS.answers.filter(a=>!a.correct).length;
      return`<div class="result-wrap">
        <div class="result-score-ring" style="border-color:${color};color:${color}">
          <div class="result-big-num">${score}</div>
          <div class="result-denom">out of ${total}</div>
        </div>
        <div class="result-verdict" style="color:${color}">${pass?'Module complete!':pct>=40?'Nearly there':'Needs review'}</div>
        <div class="result-sub">${pass?`You scored ${pct}% — above the 60% mastery threshold. Module marked complete.${wrongCount>0?` ${wrongCount} wrong answer${wrongCount!==1?'s':''} added to your Review Queue.`:''}`:`You scored ${pct}%. ${wrongCount} question${wrongCount!==1?'s':''} added to Review Queue. Review the lesson and retake to unlock this module.`}</div>
        ${wrongCount>0?`<div style="margin-bottom:14px"><span class="due-badge" onclick="go('review')">📌 ${wrongCount} card${wrongCount!==1?'s':''} queued for spaced review →</span></div>`:''}
        <div class="result-actions">
          ${pass&&nextMod?`<button class="focus-btn" onclick="go('module',{mod:'${nextMod.id}'})">Next: ${nextMod.title} →</button>`:''}
          ${pass&&!nextMod&&nextDay?`<button class="focus-btn" onclick="go('day',{day:${nextDay.day}})">Day ${nextDay.day} →</button>`:''}
          <button class="btn-sm" onclick="MS.phase='lesson';patchModuleContent(renderModuleContent(ALL_MODS.find(m=>m.id==='${mod.id}')))">Review lesson</button>
          <button class="btn-sm" onclick="retryQuiz('${mod.id}')">Retake quiz</button>
        </div>
        <div class="result-breakdown">
          <div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px">Question breakdown</div>
          ${MS.answers.map((a,i)=>`<div class="rb-row">
            <div class="rb-icon">${a.correct?'✅':'❌'}</div>
            <div class="rb-q">Q${i+1}: ${a.q.length>70?a.q.slice(0,70)+'…':a.q}</div>
            ${!a.correct?`<div style="font-size:10px;color:var(--purple)">→ queued</div>`:''}
          </div>`).join('')}
        </div>
      </div>`;
    }

    default: return'';
  }
}

// VIEW: REVIEW QUEUE
// ════════════════════════════════════════════════════
function vReview(){
  return`<div class="rq-wrap">
    <div style="margin-bottom:22px">
      <div style="font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:5px">Review Queue</div>
      <div style="font-size:13px;color:var(--text-2)">SM-2 spaced repetition — wrong answers resurface at the exact moment your brain is about to forget them.</div>
    </div>
    <div id="review-content">${vReviewContent()}</div>
  </div>`;
}

function vReviewContent(){
  const due=getDueCards();
  const all=getAllSRCards();
  const labels=['A','B','C','D'];

  if(SR.phase==='idle'){
    // Stats by domain
    const domainCards=[0,1,2,3,4].map(i=>{
      const domMods=CUR.filter(d=>d.domain===i).flatMap(d=>d.mods).map(m=>m.id);
      const cards=all.filter(c=>domMods.includes(c.modId));
      const dueNow=cards.filter(c=>c.nextReview<=Date.now());
      return{i,total:cards.length,due:dueNow.length};
    }).filter(d=>d.total>0);

    // All cards table (upcoming)
    const upcoming=all
      .filter(c=>c.nextReview>Date.now())
      .sort((a,b)=>a.nextReview-b.nextReview)
      .slice(0,8);

    return`
      <div class="rq-hero">
        <div class="rq-count-ring" style="border-color:${due.length>0?'var(--purple)':'var(--teal)'};color:${due.length>0?'var(--purple)':'var(--teal)'}">
          <div class="rq-count-num">${due.length}</div>
          <div class="rq-count-lbl">due now</div>
        </div>
        <div style="font-size:17px;font-weight:700;margin-bottom:6px">${due.length>0?`${due.length} card${due.length!==1?'s':''} ready to review`:'You\'re all caught up!'}</div>
        <div style="font-size:13px;color:var(--text-2);margin-bottom:20px;max-width:440px;margin-left:auto;margin-right:auto">${due.length>0?'These concepts are at the optimal moment for review — do it now while the forgetting curve is in your favour.':'No cards are due right now. Keep working through modules and wrong answers will appear here automatically.'}</div>
        ${due.length>0?`<button class="focus-btn" onclick="startReviewSession()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M4.5 2.5l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Start review session (${due.length} cards)
        </button>`:'<button class="btn-sm" onclick="go(\'dashboard\')">Back to dashboard</button>'}
      </div>

      ${domainCards.length>0?`
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px">
        <div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px">Cards by domain</div>
        ${domainCards.map(({i,total,due:dNow})=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="width:8px;height:8px;border-radius:50%;background:${DC[i]};flex-shrink:0"></div>
          <div style="flex:1;font-size:13px">${DS[i]}</div>
          <div style="font-size:12px;color:var(--text-2);font-family:'IBM Plex Mono',monospace">${total} card${total!==1?'s':''}</div>
          ${dNow>0?`<div style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(139,92,246,.12);color:var(--purple)">${dNow} due</div>`:'<div style="font-size:11px;color:var(--text-3)">scheduled</div>'}
        </div>`).join('')}
      </div>`:''}

      ${upcoming.length>0?`
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px">
        <div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px">Upcoming reviews</div>
        ${upcoming.map(c=>{
          const mod=ALL_MODS.find(m=>m.id===c.modId);
          const daysLeft=Math.ceil((c.nextReview-Date.now())/(24*60*60*1000));
          return`<div style="display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
            <div style="flex:1;min-width:0">
              <div style="font-size:12.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.q.length>70?c.q.slice(0,70)+'…':c.q}</div>
              <div style="font-size:11px;color:var(--text-3);margin-top:2px">${mod?.title||c.modId}</div>
            </div>
            <div style="font-size:11px;font-weight:600;color:var(--text-2);font-family:'IBM Plex Mono',monospace;flex-shrink:0;white-space:nowrap">in ${daysLeft}d · ×${c.repetition}</div>
          </div>`;
        }).join('')}
      </div>`:''}`;
  }

  if(SR.phase==='session'){
    const card=SR.queue[SR.current];
    const prog=Math.round((SR.current/SR.queue.length)*100);
    const mod=ALL_MODS.find(m=>m.id===card.modId);
    const di=CUR.findIndex(d=>d.mods.some(m=>m.id===card.modId));
    const domColor=di>=0&&CUR[di].domain>=0?DC[CUR[di].domain]:'var(--purple)';
    return`<div class="rq-session-wrap">
      <div class="rq-prog-bar"><div class="rq-prog-fill" style="width:${prog}%"></div></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <div style="font-size:12px;color:var(--text-2);font-family:'IBM Plex Mono',monospace">Card ${SR.current+1} of ${SR.queue.length}</div>
        <div style="font-size:12px;font-weight:600;color:${SR.sessionAnswers.length>0?(SR.sessionAnswers.filter(a=>a.correct).length/SR.sessionAnswers.length)>=0.6?'var(--teal)':'var(--amber)':'var(--text-2)'};font-family:'IBM Plex Mono',monospace">
          ${SR.sessionAnswers.filter(a=>a.correct).length}/${SR.sessionAnswers.length} correct
        </div>
      </div>
      <div class="rq-card">
        <div class="rq-card-meta">
          <span style="color:${domColor}">${mod?.title||''}</span>
          <span style="color:var(--text-3)">·</span>
          <span class="rq-interval-tag">Review ×${card.repetition+1}</span>
          <span style="color:var(--text-3)">·</span>
          <span style="color:var(--text-3)">Interval: ${card.interval}d</span>
        </div>
        <div class="q-text">${card.q}</div>
      </div>
      <div class="options-list">
        ${card.opts.map((opt,i)=>`<button class="opt-btn" onclick="srSelectAnswer(${i})">
          <div class="opt-label">${labels[i]}</div>
          <div>${opt}</div>
        </button>`).join('')}
      </div>
      <div id="sr-feedback" style="margin-top:10px"></div>
    </div>`;
  }

  if(SR.phase==='done'){
    const correct=SR.sessionAnswers.filter(a=>a.correct).length;
    const total=SR.sessionAnswers.length;
    const pct=total>0?Math.round((correct/total)*100):0;
    const stillDue=srDueCount();
    return`<div class="sr-session-result">
      <div style="font-size:36px;margin-bottom:18px">✅</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:6px">Session complete</div>
      <div style="font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${pct>=70?'var(--teal)':pct>=50?'var(--amber)':'var(--red)'};margin-bottom:6px">${correct}/${total}</div>
      <div style="font-size:13px;color:var(--text-2);line-height:1.7;max-width:420px;margin:0 auto 20px">
        Cards answered correctly are scheduled further out. Incorrect ones are already rescheduled for a short interval. The SM-2 algorithm adapts to your performance automatically.
      </div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        ${stillDue>0?`<button class="focus-btn" onclick="startReviewSession()">Review ${stillDue} more →</button>`:''}
        <button class="btn-sm" onclick="go('dashboard')">Back to dashboard</button>
      </div>
      <div style="margin-top:22px;border-top:1px solid var(--border);padding-top:16px">
        <div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px">Session breakdown</div>
        ${SR.sessionAnswers.map((a,i)=>`<div style="display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:14px">${a.correct?'✅':'❌'}</div>
          <div style="font-size:12px;color:var(--text-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.q.length>72?a.q.slice(0,72)+'…':a.q}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  return'';
}

// VIEW: EXAM
// ════════════════════════════════════════════════════
function vExam(){
  return`<div id="exam-content">${vExamContent()}</div>`;
}

function vExamContent(){
  if(EX.phase==='pre') return vExamPre();
  if(EX.phase==='generating') return vExamGenerating();
  if(EX.phase==='active') return vExamActive();
  if(EX.phase==='result') return vExamResult();
  return '';
}

function vExamPre(){
  const best=ST.examHistory.length?Math.max(...ST.examHistory.map(e=>e.scaled)):null;
  return`<div class="exam-pre">
    <div style="margin-bottom:24px">
      <div style="font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px">Practice Exam Simulator</div>
      <div style="font-size:13px;color:var(--text-2);line-height:1.7">Simulates the real DA0-001 exam. Questions are AI-generated, domain-weighted, and shuffled randomly each attempt. Pass mark is 675/900 (scaled).</div>
    </div>
    <div class="exam-rule-grid">
      <div class="exam-rule-card"><div class="exam-rule-icon">📋</div><div class="exam-rule-label">Questions</div><div class="exam-rule-val">~90 questions</div></div>
      <div class="exam-rule-card"><div class="exam-rule-icon">⏱</div><div class="exam-rule-label">Time limit</div><div class="exam-rule-val">90 minutes</div></div>
      <div class="exam-rule-card"><div class="exam-rule-icon">🎯</div><div class="exam-rule-label">Pass score</div><div class="exam-rule-val">675 / 900</div></div>
      <div class="exam-rule-card"><div class="exam-rule-icon">🏳</div><div class="exam-rule-label">Flagging</div><div class="exam-rule-val">Flag & review</div></div>
    </div>
    ${best!==null?`<div style="background:rgba(0,201,167,.07);border:1px solid rgba(0,201,167,.2);border-radius:10px;padding:14px 16px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-size:12px;color:var(--text-2)">Best score</div><div style="font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${best>=675?'var(--teal)':'var(--amber)'}">${best}/900</div></div>
      <div style="font-size:12px;color:var(--text-2)">${ST.examHistory.length} attempt${ST.examHistory.length!==1?'s':''}</div>
      <button class="btn-sm" onclick="go('analytics')">View history →</button>
    </div>`:''}
    <div style="background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:14px 16px;margin-bottom:22px">
      <div style="font-size:11px;font-weight:700;color:var(--amber);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px">⚠ Before you start</div>
      <div style="font-size:12.5px;color:var(--text-2);line-height:1.7">Each exam generates fresh questions via the Claude API — this takes ~30 seconds. Do not close the window during generation. Treat this like the real exam: no pausing, no looking things up.</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="focus-btn" onclick="generateExamQuestions()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M4.5 2.5l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Start exam
      </button>
      <button class="btn-sm" onclick="go('dashboard')">Back to dashboard</button>
    </div>
  </div>`;
}

function vExamGenerating(){
  const statusIcon=s=>s===false?'<div class="exam-gen-dot" style="background:var(--border)"></div>':s==='loading'?'<div class="exam-gen-spinner"></div>':'<div style="color:var(--teal);font-size:13px">✓</div>';
  const done=EX.genStatus.filter(s=>s==='done').length;
  return`<div class="exam-gen-wrap">

// HELPERS
// ════════════════════════════════════════════════════
function recalcMastery(){
  for(let i=0;i<5;i++){
    const allMods=CUR.filter(d=>d.domain===i).flatMap(d=>d.mods);
    if(!allMods.length)continue;
    const scored=allMods.filter(m=>ST.quizScores[m.id]);
    if(scored.length>0){
      const avg=scored.reduce((s,m)=>s+ST.quizScores[m.id].pct,0)/scored.length;
      const coverage=scored.length/allMods.length;
      ST.mastery[i]=Math.round(avg*coverage);
    }else{
      const done=allMods.filter(m=>ST.done.includes(m.id)).length;
      ST.mastery[i]=Math.round((done/allMods.length)*100);
    }
  }
}

function updateStreak(){
  const today=new Date().toDateString();
  if(ST.lastActive!==today){
    const yesterday=new Date(Date.now()-86400000).toDateString();
    ST.streak=ST.lastActive===yesterday?ST.streak+1:1;
    ST.lastActive=today;
  }
}

function setExamDate(){
  const inp=document.getElementById('exam-inp');
  if(inp&&inp.value){ST.examDate=inp.value;saveState();render();}
}
